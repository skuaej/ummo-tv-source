name: Build Mizofy TV APKs

on:
  push:
    branches:
      - main

jobs:
  build-user:
    name: Build User App APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          packager: npm

      - name: Install dependencies
        working-directory: ./mizofy-tv-user
        run: npm install

      - name: Generate Android project
        working-directory: ./mizofy-tv-user
        run: npx expo prebuild --clean

      - name: Build APK with Gradle
        working-directory: ./mizofy-tv-user/android
        run: ./gradlew assembleRelease

      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: Mizofy-User-APK
          path: ./mizofy-tv-user/android/app/build/outputs/apk/release/app-release.apk

  build-admin:
    name: Build Admin App APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          packager: npm

      - name: Install dependencies
        working-directory: ./mizofy-tv-admin
        run: npm install

      - name: Setup Admin Build Environment
        run: |
          mkdir -p admin-build
          cp -r mizofy-tv-admin/* admin-build/
          # Ensure no root node_modules interfere
          rm -rf node_modules

      - name: Install Admin Dependencies
        working-directory: ./admin-build
        run: npm install --legacy-peer-deps

      - name: Generate Admin Android Project
        working-directory: ./admin-build
        run: npx expo prebuild --platform android

      - name: Build Admin APK
        working-directory: ./admin-build/android
        env:
          REACT_NATIVE_NODE_MODULES_DIR: ../node_modules
        run: ./gradlew assembleRelease

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: Mizofy-Admin-APK
          path: admin-build/android/app/build/outputs/apk/release/app-release.apk
